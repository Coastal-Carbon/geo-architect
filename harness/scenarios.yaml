# Librarian end-to-end test scenarios
#
# Each scenario asks the librarian directly how to download and use a specific
# dataset, then attempts to download one sample using only the information the
# librarian provides plus the recipe files in the catalog.
#
# Fields:
#   id              — dataset ID (matches datasets/profiles/{id}.yaml)
#   name            — human-readable dataset name
#   question        — direct question sent to the querying agent
#   access_pattern  — how this dataset is fetched (CollectionInput, Ancillary, DirectSTAC, OverpassAPI)
#   expected_outcome — SUCCESS or expected_failure
#   timeout_seconds — max runtime for the test session

scenarios:

  # --- Free satellite imagery (CollectionInput pattern) ---

  - id: sentinel-2-l2a
    name: Sentinel-2 L2A Surface Reflectance
    question: >
      How do I download and use Sentinel-2 L2A data using the Hum Data Engine?
      I need to get a single sample tile for San Francisco.
    access_pattern: CollectionInput
    expected_outcome: success
    timeout_seconds: 300

